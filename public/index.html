<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <link rel = "stylesheet" href="style.css">
  </head>
  <body>
    <div class="chat">
      <ul class="messages"></ul>
      <form class="form">
        <input class="input" autocomplete="off" />
        <button class="submit">Send</button>
      </form>
    </div>

    <script>
      function main() {
        const host = location.origin.replace(/^http/, 'ws')
        const ws = new WebSocket(host + '/ws')
        const myId = self.crypto.randomUUID().substr(0, 8)

        const form = document.querySelector('.form')

        form.onsubmit = function (e) {
          e.preventDefault()
          const input = document.querySelector('.input')
          const text = input.value
          ws.send(JSON.stringify({ id: myId, text }))
          input.value = ''
          input.focus()
        }

        ws.onmessage = function (msg) {
          const response = msg.data
          const { id, text } = JSON.parse(msg.data)
          const messageList = document.querySelector('.messages')
          const li = document.createElement('li')
          li.classList.add('message')
          if (id === myId) {
            li.textContent = `${text}`
            li.classList.add('my-message')
          }
          else if (id === "BOT") {
            li.textContent = `🤖BOT: ${text}`
            li.classList.add('bot-message')
          }
          else {
            li.textContent = `${id}: ${text}`
            li.classList.add('other-message')
          }
          messageList.appendChild(li)
          messageList.scrollTop = messageList.scrollHeight
        }

        ws.onerror = function (error) {
          console.error('WebSocket Error: ', error)
        }
      }

      main()
    </script>
  </body>
</html>
